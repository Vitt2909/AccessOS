<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AccessOS - Protótipo (em reconstrução)</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <h1>AccessOS</h1>
        <p>Reconstrução do protótipo Figma página por página</p>
      </header>

      <section id="prototype-frame" class="phone-frame" aria-live="polite"></section>

      <nav class="controls" aria-label="Navegação de páginas">
        <button id="prev">← Anterior</button>
        <span id="counter"></span>
        <button id="next">Próxima →</button>
      </nav>

      <section class="notes">
        <h2>Status</h2>
        <ul>
          <li>Estrutura base criada para receber telas do Figma.</li>
          <li>As telas abaixo são placeholders até receber referência visual/export.</li>
          <li>Assim que houver acesso às telas, a reconstrução segue 1:1 por página.</li>
        </ul>
      </section>
    </main>

    <script type="module" src="src/app.js"></script>
  </body>
</html>
